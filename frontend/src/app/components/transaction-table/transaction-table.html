<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Transactions</h2>
    <app-add-transaction-modal></app-add-transaction-modal>
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-hover">
      <thead class="table-dark">
      <tr>
        <th>Date</th>
        <th>Account Number</th>
        <th>Account Holder</th>
        <th>Amount</th>
        <th>Status</th>
      </tr>
      </thead>
      <tbody>
        @for (t of transactions; track $index) {
          <tr>
            <td>{{t.transactionDate}}</td>
            <td>{{t.accountNumber}}</td>
            <td>{{t.accountHolderName}}</td>
            <td>{{t.amount | currency}}</td>
            <td>
              <span class="badge"
                    [class.bg-warning]="t.status === 'Pending'"
                    [class.bg-success]="t.status === 'Settled'"
                    [class.bg-danger]="t.status === 'Failed'">
                {{t.status}}
              </span>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="5" class="text-center text-muted">No transactions found</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
