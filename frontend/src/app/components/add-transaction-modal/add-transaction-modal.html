<button class="btn btn-primary btn-lg shadow-sm d-flex align-items-center gap-2" (click)="open()">
  <span class="fs-5">+</span> Add Transaction
</button>

<ng-template #modalContent let-modal>
  <div class="modal-header border-0 pb-0">
    <div>
      <h4 class="modal-title fw-bold">💳 Add New Transaction</h4>
      <p class="text-muted mb-0 small">Fill in the details below</p>
    </div>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body pt-4">
    <form #transactionForm="ngForm">
      <div class="mb-4">
        <label class="form-label fw-semibold">Account Number</label>
        <input type="text"
               class="form-control form-control-lg"
               [(ngModel)]="transaction.accountNumber"
               name="accountNumber"
               required
               pattern="^\d{4}-\d{4}-\d{4}$"
               placeholder="1234-5678-9012"
               #accountNumber="ngModel"
               [class.is-invalid]="accountNumber.invalid && accountNumber.touched">
        <div class="invalid-feedback">
          Please enter a valid account number (format: 1234-5678-9012)
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Account Holder Name</label>
        <input type="text"
               class="form-control form-control-lg"
               [(ngModel)]="transaction.accountHolderName"
               name="accountHolderName"
               required
               placeholder="John Doe"
               #accountHolderName="ngModel"
               [class.is-invalid]="accountHolderName.invalid && accountHolderName.touched">
        <div class="invalid-feedback">
          Account holder name is required
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-4">
          <label class="form-label fw-semibold">Amount</label>
          <div class="input-group input-group-lg">
            <span class="input-group-text">$</span>
            <input type="number"
                   class="form-control"
                   [(ngModel)]="transaction.amount"
                   name="amount"
                   required
                   min="0.01"
                   step="0.01"
                   placeholder="0.00"
                   #amount="ngModel"
                   [class.is-invalid]="amount.invalid && amount.touched">
            <div class="invalid-feedback">
              Amount must be greater than 0
            </div>
          </div>
        </div>

        <div class="col-md-6 mb-4">
          <label class="form-label fw-semibold">Status</label>
          <select class="form-select form-select-lg" [(ngModel)]="transaction.status" name="status">
            <option value="Pending">Pending</option>
            <option value="Settled">Settled</option>
            <option value="Failed">Failed</option>
          </select>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="submit(transactionForm)" [disabled]="transactionForm.invalid">Save Transaction</button>
  </div>
</ng-template>
