<button class="btn btn-primary" (click)="open()">
  Add Transaction
</button>

<ng-template #modalContent let-modal>
  <div class="modal-header">
    <h5 class="modal-title">Add New Transaction</h5>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body">
    <form>
      <div class="mb-3">
        <label class="form-label">Account Number</label>
        <input type="text" class="form-control" [(ngModel)]="transaction.accountNumber" name="accountNumber" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Account Holder Name</label>
        <input type="text" class="form-control" [(ngModel)]="transaction.accountHolderName" name="accountHolderName" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" class="form-control" [(ngModel)]="transaction.amount" name="amount" required min="0.01" step="0.01">
      </div>

      <div class="mb-3">
        <label class="form-label">Status</label>
        <select class="form-select" [(ngModel)]="transaction.status" name="status">
          <option value="Pending">Pending</option>
          <option value="Settled">Settled</option>
          <option value="Failed">Failed</option>
        </select>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="submit()">Save Transaction</button>
  </div>
</ng-template>
