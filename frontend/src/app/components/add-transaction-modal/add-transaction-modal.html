<button (click)="open()">Add Transaction</button>

@if (showModal) {
  <div class="modal">
    <h3>Add Transaction</h3>

    <form (ngSubmit)="submit()">

      <label>Account Number</label>
      <input type="text" [(ngModel)]="transaction.accountNumber" name="accountNumber" required>

      <label>Account Holder Name</label>
      <input type="text" [(ngModel)]="transaction.accountHolderName" name="accountHolderName" required>

      <label>Amount</label>
      <input type="number" [(ngModel)]="transaction.amount" name="amount" required>

      <label>Status</label>
      <select [(ngModel)]="transaction.status" name="status">
        <option value="Pending">Pending</option>
        <option value="Settled">Settled</option>
      </select>

      <br><br>

      <button type="button" (click)="submit()">Save</button>
      <button type="button" (click)="close()">Cancel</button>

    </form>
  </div>
}
